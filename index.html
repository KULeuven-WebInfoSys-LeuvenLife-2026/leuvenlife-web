<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeuvenLife - Welcome</title>
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1920A6; 
            color: white;
            overflow-x: hidden;
        }

        .giant-title {
            font-size: clamp(5rem, 12vw, 15rem);
            line-height: 0.85;
            letter-spacing: -0.04em;
            font-weight: 600;
        }

        .nav-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-btn:hover {
            background-color: white;
            color: #1920A6;
            transform: translateX(10px);
        }
    </style>
</head>
<body class="h-screen w-full flex flex-col relative p-6 md:p-12">

    <!-- Top Left Header/Logo Box -->
    <div class="absolute top-8 left-8 md:top-12 md:left-12 border border-white/50 px-6 py-3 text-xs md:text-sm tracking-widest uppercase flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 12h-5m20 0h-5m-10 0v5m0-10v-5m-4 5h14a2 2 0 012 2v14a2 2 0 01-2 2H3.5a2 2 0 01-2-2V8.5a2 2 0 012-2z" />
        </svg>
        KU Leuven Student Guide
    </div>

    <!-- Main Grid System -->
    <div class="grid grid-cols-1 lg:grid-cols-4 h-full pt-32 lg:pt-0 relative z-10">
        
        <div class="hidden lg:block relative"></div>

        <!-- Button 1 (Food) -->
        <div class="relative pt-24 pl-8 lg:pl-12">
            <div class="bg-white/40 w-px absolute left-0 top-0 h-[70%] hidden lg:block"></div>
            <a href="#food" class="nav-btn block border border-white px-8 py-4 w-max text-sm uppercase tracking-widest mb-8 lg:mb-0">
                01. Food
            </a>
        </div>

        <!-- Button 2 (Housing) -->
        <div class="relative pt-24 pl-8 lg:pl-12">
            <div class="bg-white/40 w-px absolute left-0 top-0 h-[60%] hidden lg:block"></div>
            <a href="#housing" class="nav-btn block border border-white px-8 py-4 w-max text-sm uppercase tracking-widest mb-8 lg:mb-0">
                02. Housing
            </a>
        </div>

        <!-- Button 3 (Transport) & Tagline -->
        <div class="relative pt-24 pl-8 lg:pl-12 flex flex-col h-full">
            <div class="bg-white/40 w-px absolute left-0 top-0 h-[80%] hidden lg:block"></div>
            <a href="#transport" class="nav-btn block border border-white px-8 py-4 w-max text-sm uppercase tracking-widest mb-16">
                03. Transport
            </a>
            <div class="mt-auto mb-48 lg:mb-64">
                <p class="text-2xl md:text-3xl leading-tight font-light max-w-xs">
                    Your digital starting<br>
                    point for life in<br>
                    Belgium.
                </p>
            </div>
        </div>
    </div>

    <!-- Giant Typography -->
    <div class="absolute bottom-4 left-6 md:bottom-8 md:left-12 z-0 pointer-events-none">
        <h1 class="giant-title">Leuven<br>Life.</h1>
    </div>

</body>
</html>
